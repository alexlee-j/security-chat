name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  RUST_VERSION: '1.88'

jobs:
  # Backend 测试
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security-chat-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        run: pnpm build:backend

      - name: Build and start backend for tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/security-chat-test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-change-in-production
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: security-chat-test
          DB_SYNC: 'true'
          SKIP_SMTP_VERIFY: 'true'
        run: |
          # Build backend first (must complete before starting)
          pnpm build:backend

          # Start backend in background - nest build outputs to dist/src/main.js
          cd apps/backend && pnpm exec node dist/src/main.js &
          BACKEND_PID=$!
          echo "Backend PID: $BACKEND_PID"

          # Wait for backend to be ready
          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -s --connect-timeout 1 http://localhost:3000 > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            if ! kill -0 $BACKEND_PID 2>/dev/null; then
              echo "Backend process died!"
              exit 1
            fi
            sleep 1
          done

          # Run tests (forceExit is already configured in jest-e2e.json)
          pnpm test:e2e

          # Cleanup
          kill $BACKEND_PID 2>/dev/null || true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: backend
          fail_ci_if_error: false

  # Desktop (Tauri) 编译检查
  desktop-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install system dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev protobuf-compiler

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop frontend
        run: pnpm build:desktop

      - name: Check Rust compilation
        run: cargo check --all-targets
        working-directory: apps/desktop/src-tauri
        continue-on-error: true

      - name: Run Rust tests
        run: cargo test
        working-directory: apps/desktop/src-tauri
        continue-on-error: true

  # 前端构建检查
  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build desktop frontend
        run: pnpm build:desktop
        continue-on-error: true

      - name: Build backend
        run: pnpm build:backend

  # 汇总检查结果
  check-status:
    needs: [backend-test, desktop-check, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed!"
