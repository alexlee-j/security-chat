name: CD

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '18'
  RUST_VERSION: '1.85'

jobs:
  # 发布后端
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        run: pnpm build:backend

      - name: Deploy to production
        run: |
          echo "Deploy backend to production..."
          echo "Version: ${{ github.ref_name }}"
          # 添加部署逻辑（根据实际部署环境配置）

  # 构建桌面应用
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli
        working-directory: apps/desktop/src-tauri

      - name: Build Tauri app
        run: pnpm tauri build
        working-directory: apps/desktop

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: security-chat-linux
          path: apps/desktop/src-tauri/target/release/bundle/

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: security-chat-macos
          path: apps/desktop/src-tauri/target/release/bundle/

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: security-chat-windows
          path: apps/desktop/src-tauri/target/release/bundle/

  # 创建 GitHub Release
  create-release:
    needs: [deploy-backend, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            security-chat-linux/**/*
            security-chat-macos/**/*
            security-chat-windows/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
