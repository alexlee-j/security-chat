# Prometheus 监控配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则
rule_files:
  - "alerts.yml"

# 抓取配置
scrape_configs:
  # 后端服务
  - job_name: 'backend'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node.js 应用
  - job_name: 'nodejs'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
